name: upsync Build and Publish

on:
  workflow_dispatch:

env:
  PROJECT_PATH: src/tools/upsync/upsync.csproj

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: upsync-windows
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: upsync-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: ${{ env.PROJECT_PATH }}

      - name: Restore .NET dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish upsync project
        shell: bash
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishTrimmed=false \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --output publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: publish
